name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # ubuntu has strace by default and is the only OS the fixture tests run on.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install strace
        run: sudo apt-get update && sudo apt-get install -y strace
      - name: Install package + test deps
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          pip install build
          python -m build
      - name: Verify metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
